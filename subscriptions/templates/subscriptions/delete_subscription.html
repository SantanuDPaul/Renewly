{% extends "base.html" %}

{% block content %}
    <h1>Delete Subscription</h1>
    <p>Are you sure you want to delete the subscription "<strong>{{ subscription.service_name }}</strong>"?</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit">Yes</button>
        <a href="{% url 'subscription_list' %}">Cancel</a>
    </form>
{% endblock %}
