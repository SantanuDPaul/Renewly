{% extends "base.html" %}

{% block content %}

    <h2>Register</h2>
    <form method="post">
        {% csrf_token %}
        {% if messages %}
        <ul>
            {% for message in messages %}
            <li>{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {{ form.as_p }}
        <button type="submit">Create Account</button>
    </form>
{% endblock %}
