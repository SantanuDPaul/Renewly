<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title|default:"Renewly" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">

            {% if user.is_authenticated %}
            <a class="navbar-brand" href="{% url 'dashboard' %}">
                {% else %}
                <a class="navbar-brand" href="{% url 'login' %}">
                    {% endif %}
                    Renewly
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">

                    <ul class="navbar-nav me-auto">
                        {% if user.is_authenticated %}

                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'dashboard' %}">
                                Dashboard
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'subscription_list' %}">
                                My Subscriptions
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'add_subscription' %}">
                                Add Subscription
                            </a>
                        </li>
                        {% endif %}
                    </ul>

                    {% if user.is_authenticated %}

                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button class="btn btn-outline-light" type="submit">
                            Logout
                        </button>
                    </form>

                    {% else %}

                    <a class="btn btn-outline-light me-2" href="{% url 'login' %}">
                        Login
                    </a>

                    <a class="btn btn-light" href="{% url 'register' %}">
                        Register
                    </a>

                    {% endif %}

                </div>

        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}

        {% endblock %}
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
